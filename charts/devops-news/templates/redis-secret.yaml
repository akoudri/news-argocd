{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devops-news.redisSecretName" . }}
  labels:
    {{- include "devops-news.labels" (dict "root" . "component" "redis") | nindent 4 }}
type: Opaque
data:
  password: {{ .Values.redis.password | b64enc | quote }}
{{- end }}
