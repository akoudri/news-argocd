suite: "Backend — Deployment et Service"

templates:
  - "templates/backend.yaml"

tests:

  # -- Cas nominal --
  - it: "doit creer un Deployment et un Service"
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: Deployment
        documentIndex: 0
      - isKind:
          of: Service
        documentIndex: 1

  - it: "le Deployment doit avoir le bon nombre de replicas par defaut"
    asserts:
      - equal:
          path: spec.replicas
          value: 2
        documentIndex: 0

  - it: "le nom du Deployment doit inclure le nom de la release"
    release:
      name: my-release
    asserts:
      - equal:
          path: metadata.name
          value: my-release-backend
        documentIndex: 0

  # -- Variables d'environnement --
  - it: "doit injecter REDIS_HOST avec le nom de la release"
    release:
      name: production
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_HOST
            value: "production-redis"
        documentIndex: 0

  - it: "doit injecter LOG_LEVEL depuis les values"
    set:
      backend.logLevel: "DEBUG"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LOG_LEVEL
            value: "DEBUG"
        documentIndex: 0

  - it: "doit referencer le Secret Redis pour REDIS_PASSWORD"
    release:
      name: test
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: test-redis-secret
                key: password
        documentIndex: 0

  # -- Image Docker --
  - it: "doit construire le nom d'image avec le compte et le tag"
    set:
      images.repoAccount: "myorg"
      images.tags.backend: "v2.1"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "myorg/devops-news-api:v2.1"
        documentIndex: 0

  # -- Surcharge des replicas --
  - it: "doit respecter la valeur de replicas surchargee"
    set:
      backend.replicas: 5
    asserts:
      - equal:
          path: spec.replicas
          value: 5
        documentIndex: 0

  # -- Service --
  - it: "le Service doit etre de type ClusterIP par defaut"
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP
        documentIndex: 1

  - it: "le Service doit exposer le bon port"
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 5000
        documentIndex: 1

  # -- Variables d'environnement supplementaires (extraEnv) --
  - it: "doit injecter les extraEnv quand elles sont definies"
    set:
      backend.extraEnv:
        - name: FEATURE_X
          value: "enabled"
        - name: SENTRY_DSN
          value: "https://sentry.io/123"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_X
            value: "enabled"
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SENTRY_DSN
            value: "https://sentry.io/123"
        documentIndex: 0

  - it: "ne doit pas avoir d'extraEnv quand la liste est vide"
    set:
      backend.extraEnv: []
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_X
            value: "enabled"
        documentIndex: 0
