apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devops-news.fullname" (dict "root" . "component" "frontend") }}
  labels:
    {{- include "devops-news.labels" (dict "root" . "component" "frontend") | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      {{- include "devops-news.selectorLabels" (dict "root" . "component" "frontend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "devops-news.selectorLabels" (dict "root" . "component" "frontend") | nindent 8 }}
    spec:
      containers:
        - name: web
          image: "{{ .Values.images.repoAccount }}/devops-news-front:{{ .Values.images.tags.frontend }}"
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "devops-news.fullname" (dict "root" . "component" "frontend-config") }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-news.fullname" (dict "root" . "component" "frontend") }}
  labels:
    {{- include "devops-news.labels" (dict "root" . "component" "frontend") | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    {{- include "devops-news.selectorLabels" (dict "root" . "component" "frontend") | nindent 4 }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: 80
